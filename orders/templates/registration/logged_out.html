{% extends "base.html" %}

{% block content %}

<div style="
    max-width: 600px;
    margin: 60px auto;
    padding: 40px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
    font-family: Arial, sans-serif;
">

    <h2 style="font-size: 28px; margin-bottom: 20px; color: #333;">
        You have been logged out
    </h2>

    <p style="font-size: 16px; color: #555; margin-bottom: 30px;">
        Thank you for using the Alteration System.
    </p>

    <a href="/accounts/login/" style="
        display: inline-block;
        padding: 12px 20px;
        background: #4a90e2;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
    ">
        Login again
    </a>

</div>

{% endblock %}

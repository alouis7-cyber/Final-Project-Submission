<form method="POST" action="{% url 'add_to_cart' product.id %}">
    {% csrf_token %}
    <button type="submit"
        style="display:block;padding:10px;background:#3498db;color:white;border-radius:6px;
               text-decoration:none;font-weight:bold;border:none;width:100%;cursor:pointer;">
        Add to Cart
    </button>
</form>
